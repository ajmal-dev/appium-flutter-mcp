<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flutter Widget Inspector</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#1e1e2e; color:#cdd6f4; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    #bar { background:#313244; padding:8px 12px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #45475a; }
    #bar input { flex:1; background:#1e1e2e; border:1px solid #45475a; color:#cdd6f4; padding:5px 10px; border-radius:6px; font-size:13px; }
    #bar input:focus { outline:none; border-color:#89b4fa; }
    button { padding:5px 14px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:500; }
    .bp { background:#89b4fa; color:#1e1e2e; } .bp:hover { background:#74c7ec; }
    .bs { background:#45475a; color:#cdd6f4; } .bs:hover { background:#585b70; }
    .bd { background:#f38ba8; color:#1e1e2e; } .bd:hover { background:#eba0ac; }
    #dot { width:10px; height:10px; border-radius:50%; background:#f38ba8; } #dot.on { background:#a6e3a1; }
    #main { display:flex; flex:1; overflow:hidden; }
    #left { flex:0 0 auto; background:#181825; display:flex; align-items:center; justify-content:center; position:relative; cursor:crosshair; overflow:hidden; }
    #left img { max-height:calc(100vh - 42px); width:auto; display:block; }
    #left .ph { color:#6c7086; text-align:center; padding:40px; font-size:14px; line-height:2; }
    #hl { position:absolute; border:2px solid #f9e2af; background:rgba(249,226,175,0.15); pointer-events:none; display:none; border-radius:3px; }
    #hlt { position:absolute; background:#f9e2af; color:#1e1e2e; font-size:10px; padding:1px 5px; border-radius:3px; pointer-events:none; display:none; font-weight:600; white-space:nowrap; }
    #right { flex:1; min-width:360px; border-left:1px solid #45475a; display:flex; flex-direction:column; overflow:hidden; }
    #tabs { display:flex; border-bottom:1px solid #45475a; }
    .tab { padding:8px 16px; font-size:12px; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; color:#6c7086; }
    .tab:hover { color:#cdd6f4; } .tab.active { color:#89b4fa; border-bottom-color:#89b4fa; }
    #ctrls { padding:8px 12px; display:flex; gap:6px; flex-wrap:wrap; border-bottom:1px solid #313244; }
    #panel { flex:1; overflow-y:auto; padding:0; }
    .section-title { padding:10px 14px; font-size:11px; color:#6c7086; text-transform:uppercase; font-weight:700; letter-spacing:0.5px; }
    .winfo { padding:12px 14px; border-bottom:1px solid #313244; }
    .winfo .wtype { font-size:16px; font-weight:700; color:#f9e2af; margin-bottom:6px; }
    .winfo .wmeta { font-size:11px; color:#6c7086; margin-bottom:2px; } .winfo .wmeta span { color:#a6adc8; }
    .lcard { background:#313244; border-radius:8px; padding:10px; margin:4px 14px 4px; cursor:pointer; border:1px solid transparent; transition:border-color .15s; }
    .lcard:hover { border-color:#89b4fa; } .lcard.best { border-color:#a6e3a1; }
    .lh { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
    .lby { font-size:10px; font-weight:700; text-transform:uppercase; padding:1px 6px; border-radius:3px; }
    .lby.key { background:#a6e3a1; color:#1e1e2e; } .lby.text { background:#89b4fa; color:#1e1e2e; }
    .lby.semanticsLabel { background:#cba6f7; color:#1e1e2e; } .lby.type { background:#6c7086; color:#1e1e2e; }
    .lby.tooltip { background:#f9e2af; color:#1e1e2e; } .lby.accessibilityId { background:#fab387; color:#1e1e2e; }
    .conf { font-size:10px; } .conf.h { color:#a6e3a1; } .conf.m { color:#f9e2af; } .conf.l { color:#f38ba8; }
    .lval { font-family:'SF Mono','Fira Code',monospace; font-size:12px; color:#cdd6f4; word-break:break-all; }
    .lcode { font-family:'SF Mono','Fira Code',monospace; font-size:10px; color:#6c7086; margin-top:4px; background:#1e1e2e; padding:4px 6px; border-radius:4px; }
    .ei { padding:5px 14px; font-size:11px; color:#a6adc8; cursor:pointer; display:flex; justify-content:space-between; border-radius:4px; }
    .ei:hover { background:#313244; }
    .ei .etype { color:#f9e2af; font-weight:500; min-width:120px; }
    .ei .ekey { color:#a6e3a1; font-family:monospace; font-size:10px; }
    .ei .eloc { color:#6c7086; font-family:monospace; font-size:10px; }
    .empty { padding:30px; text-align:center; color:#6c7086; }
    .empty h3 { color:#a6adc8; margin-bottom:6px; }
    .toast { position:fixed; bottom:16px; right:16px; background:#a6e3a1; color:#1e1e2e; padding:6px 14px; border-radius:8px; font-size:12px; font-weight:600; display:none; z-index:200; }
    .wv-item { padding:10px 14px; border-bottom:1px solid #313244; }
    .wv-item .wv-url { font-size:11px; color:#89b4fa; word-break:break-all; }
    .wv-item .wv-title { font-size:13px; color:#cdd6f4; font-weight:500; }
    .wv-item .wv-ctx { font-size:10px; color:#6c7086; }
    .native-el { padding:6px 14px; font-size:11px; display:flex; gap:8px; align-items:center; }
    .native-el:hover { background:#313244; }
    .native-el .ne-type { color:#f9e2af; font-weight:500; min-width:80px; }
    .native-el .ne-label { color:#cdd6f4; flex:1; } .ne-pos { color:#6c7086; font-size:10px; }
    .loading { padding:20px; text-align:center; color:#6c7086; }
  </style>
</head>
<body>
<div id="bar">
  <div id="dot"></div>
  <input id="url" type="text" placeholder="ws://127.0.0.1:PORT/TOKEN=/ws" />
  <button class="bs" id="btnDisc">Discover</button>
  <button class="bp" id="btnConn">Connect</button>
  <button class="bd" id="btnDisc2" style="display:none">Disconnect</button>
</div>
<div id="main">
  <div id="left">
    <div class="ph" id="ph">Connect to a Flutter app to inspect widgets.<br><br>1. <code>flutter run --debug</code><br>2. Paste VM service URL<br>3. Click Connect</div>
    <img id="img" style="display:none" />
    <div id="hl"></div><div id="hlt"></div>
  </div>
  <div id="right">
    <div id="tabs">
      <div class="tab active" data-tab="flutter">Flutter</div>
      <div class="tab" data-tab="webview">WebView</div>
      <div class="tab" data-tab="native">Native</div>
    </div>
    <div id="ctrls" style="display:none">
      <button class="bs" id="btnSS">Screenshot</button>
      <button class="bs" id="btnTree">Refresh Tree</button>
      <button class="bs" id="btnLive">Live Mode</button>
    </div>
    <div id="panel">
      <div class="empty" id="emptyState"><h3>No Widget Selected</h3><p>Click on the screenshot to inspect a widget.</p></div>
    </div>
  </div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const api = window.inspector;
let connected = false, streaming = false, treeLoaded = false;
let deviceW = 0, deviceH = 0, activeTab = 'flutter';

const $ = id => document.getElementById(id);
const img = $('img'), ph = $('ph'), hl = $('hl'), hlt = $('hlt'), panel = $('panel');

// --- Connection ---
$('btnDisc').onclick = async () => {
  $('btnDisc').textContent = 'Scanning...';
  const r = await api.autoDiscover();
  $('btnDisc').textContent = 'Discover';
  if (r.urls.length) $('url').value = r.urls[0];
};

$('btnConn').onclick = async () => {
  const url = $('url').value.trim(); if (!url) return;
  $('btnConn').textContent = 'Connecting...';
  const r = await api.connect(url);
  $('btnConn').textContent = 'Connect';
  if (r.success) { setConn(true); await refreshSS(); await refreshTree(); }
  else alert('Failed: ' + r.error);
};

$('btnDisc2').onclick = async () => {
  await api.stopScreenStream(); await api.disconnect();
  setConn(false); streaming = false;
};

function setConn(s) {
  connected = s;
  $('dot').classList.toggle('on', s);
  $('btnConn').style.display = s ? 'none' : '';
  $('btnDisc2').style.display = s ? '' : 'none';
  $('ctrls').style.display = s ? 'flex' : 'none';
  if (!s) { img.style.display = 'none'; ph.style.display = 'block'; treeLoaded = false; hl.style.display = 'none'; hlt.style.display = 'none'; showEmpty(); }
}

// --- Tabs ---
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', async () => {
    document.querySelectorAll('.tab').forEach(t2 => t2.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    if (activeTab === 'flutter') { showFlutterPanel(); }
    else if (activeTab === 'webview') { await loadWebView(); }
    else if (activeTab === 'native') { await loadNative(); }
  });
});

// --- Screenshots ---
async function refreshSS() {
  const r = await api.takeScreenshot();
  if (r.success) { deviceW = r.width; deviceH = r.height; img.src = 'data:image/png;base64,' + r.base64; img.style.display = 'block'; ph.style.display = 'none'; }
  else { ph.innerHTML = '<span style="color:#f38ba8">Screenshot failed:</span><br>' + (r.error||''); }
}
$('btnSS').onclick = refreshSS;

$('btnLive').onclick = async () => {
  if (streaming) { await api.stopScreenStream(); streaming = false; $('btnLive').textContent = 'Live Mode'; $('btnLive').className = 'bs'; }
  else { await api.startScreenStream(2000); streaming = true; $('btnLive').textContent = 'Stop Live'; $('btnLive').className = 'bd'; }
};
api.onScreenshotUpdate(d => { deviceW = d.width; deviceH = d.height; img.src = 'data:image/png;base64,' + d.base64; img.style.display = 'block'; ph.style.display = 'none'; });

// --- Flutter Tree ---
let flutterElements = [];
async function refreshTree() {
  panel.innerHTML = '<div class="loading">Loading widget tree...</div>';
  const r = await api.getWidgetTree();
  if (r.error) { panel.innerHTML = '<div class="empty">' + r.error + '</div>'; return; }
  treeLoaded = true;
  flutterElements = r.elements;
  showFlutterPanel();
}
$('btnTree').onclick = refreshTree;

function showFlutterPanel() {
  if (!flutterElements.length) { showEmpty(); return; }
  let html = '<div class="section-title">Interactive Elements (' + flutterElements.length + ')</div>';
  flutterElements.forEach((el, i) => {
    const loc = el.locator ? `${el.locator.by}="${el.locator.value}"` : '';
    const keyBadge = el.key ? `<span class="ekey">${esc(el.key)}</span>` : '';
    html += `<div class="ei" data-idx="${i}"><span><span class="etype">${el.type}</span> ${el.text ? '"' + esc(el.text).slice(0,30) + '"' : ''} ${keyBadge}</span><span class="eloc">${esc(loc)}</span></div>`;
  });
  panel.innerHTML = html;
  panel.querySelectorAll('.ei').forEach(item => {
    item.addEventListener('click', () => {
      const el = flutterElements[parseInt(item.dataset.idx)];
      if (el.position) highlightW(el.position, el.type);
      showLocator({ type: el.type, key: el.key, text: el.text, position: el.position, locators: [el.locator] });
    });
  });
}

function showEmpty() { panel.innerHTML = '<div class="empty"><h3>No Widget Selected</h3><p>Click on the screenshot to inspect a widget.</p></div>'; }

// --- Click to Inspect ---
img.addEventListener('click', async (e) => {
  if (!treeLoaded) await refreshTree();
  const rect = img.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (deviceW / rect.width);
  const y = (e.clientY - rect.top) * (deviceH / rect.height);

  panel.innerHTML = '<div class="loading">Inspecting at (' + Math.round(x) + ', ' + Math.round(y) + ')...</div>';
  const r = await api.findWidgetAt(x, y);
  if (r.error) { panel.innerHTML = '<div class="empty" style="color:#f38ba8">' + r.error + '</div>'; hl.style.display = 'none'; hlt.style.display = 'none'; return; }
  if (r.position) highlightW(r.position, r.type);
  showLocator(r);
});

function highlightW(pos, name) {
  if (!pos) return;
  const rect = img.getBoundingClientRect();
  // pos is in Flutter logical pixels; screenshot is in Appium logical points
  // On iOS these are typically 1:1
  const sx = rect.width / deviceW, sy = rect.height / deviceH;
  const ox = img.offsetLeft, oy = img.offsetTop;
  hl.style.display = 'block';
  hl.style.left = (ox + pos.x * sx) + 'px'; hl.style.top = (oy + pos.y * sy) + 'px';
  hl.style.width = (pos.width * sx) + 'px'; hl.style.height = (pos.height * sy) + 'px';
  hlt.style.display = 'block'; hlt.textContent = name;
  hlt.style.left = (ox + pos.x * sx) + 'px'; hlt.style.top = (oy + pos.y * sy - 18) + 'px';
}

function showLocator(data) {
  let html = '<div class="winfo"><div class="wtype">' + (data.type || 'Unknown') + '</div>';
  if (data.position) html += '<div class="wmeta">Position: <span>(' + Math.round(data.position.x) + ', ' + Math.round(data.position.y) + ') ' + Math.round(data.position.width) + 'x' + Math.round(data.position.height) + '</span></div>';
  if (data.creationLocation) html += '<div class="wmeta">Source: <span>' + data.creationLocation.file.split('/').pop() + ':' + data.creationLocation.line + '</span></div>';
  if (data.key) html += '<div class="wmeta">Key: <span style="color:#a6e3a1">' + esc(data.key) + '</span></div>';
  if (data.text) html += '<div class="wmeta">Text: <span style="color:#89b4fa">' + esc(data.text) + '</span></div>';
  html += '</div>';

  const locs = (data.locators || []).sort((a,b) => (b.confidence||0) - (a.confidence||0));
  locs.forEach((l, i) => {
    const c = l.confidence || 0;
    const cc = c >= 0.9 ? 'h' : c >= 0.7 ? 'm' : 'l';
    html += `<div class="lcard${i===0?' best':''}" onclick="copyLoc('${l.by}','${esc(l.value)}')">
      <div class="lh"><span class="lby ${l.by}">${l.by}</span><span class="conf ${cc}">${Math.round(c*100)}%</span></div>
      <div class="lval">${esc(l.value)}</div>
      <div class="lcode">tap(by="${l.by}", target="${esc(l.value)}")</div>
    </div>`;
  });
  panel.innerHTML = html;
}

// --- WebView Tab ---
async function loadWebView() {
  panel.innerHTML = '<div class="loading">Inspecting WebViews...</div>';
  const r = await api.inspectWebview();
  if (r.error) { panel.innerHTML = '<div class="empty" style="color:#f38ba8">' + r.error + '</div>'; return; }
  let html = '<div class="section-title">Contexts: ' + (r.contexts||[]).join(', ') + '</div>';
  if (!r.webviews?.length) { html += '<div class="empty">No WebView contexts found</div>'; panel.innerHTML = html; return; }
  r.webviews.forEach(wv => {
    html += '<div class="wv-item">';
    html += '<div class="wv-ctx">' + wv.context + '</div>';
    if (wv.error) { html += '<div style="color:#f38ba8">' + wv.error + '</div>'; }
    else {
      html += '<div class="wv-title">' + esc(wv.title || 'Untitled') + '</div>';
      html += '<div class="wv-url">' + esc(wv.url) + '</div>';
      html += '<div style="font-size:10px;color:#6c7086;margin-top:4px">Source: ' + (wv.sourceLength||0) + ' chars</div>';
      if (wv.sourcePreview) html += '<pre style="font-size:10px;color:#a6adc8;margin-top:4px;white-space:pre-wrap;max-height:150px;overflow:auto">' + esc(wv.sourcePreview) + '</pre>';
    }
    html += '</div>';
  });
  panel.innerHTML = html;
}

// --- Native Tab ---
async function loadNative() {
  panel.innerHTML = '<div class="loading">Inspecting Native UI...</div>';
  const r = await api.inspectNative();
  if (r.error) { panel.innerHTML = '<div class="empty" style="color:#f38ba8">' + r.error + '</div>'; return; }
  let html = '<div class="section-title">Native Elements (' + (r.elements?.length||0) + ')</div>';
  if (!r.elements?.length) { html += '<div class="empty">No labeled native elements found</div>'; panel.innerHTML = html; return; }
  r.elements.forEach(el => {
    html += `<div class="native-el">
      <span class="ne-type">${el.type}</span>
      <span class="ne-label">${esc(el.label)} ${el.value ? '= "' + esc(el.value) + '"' : ''}</span>
      <span class="ne-pos">(${el.x},${el.y}) ${el.width}x${el.height}</span>
    </div>`;
  });
  panel.innerHTML = html;
}

// --- Utils ---
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
window.copyLoc = (by, val) => { navigator.clipboard.writeText(`tap(by="${by}", target="${val}")`); $('toast').style.display = 'block'; setTimeout(() => $('toast').style.display = 'none', 1200); };
</script>
</body>
</html>
